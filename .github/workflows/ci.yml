name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.3
          cache: false
      - name: Install exact actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
      - name: Validate GitHub Actions workflows
        run: |
          "$(go env GOPATH)/bin/actionlint" -color=false

  verify:
    name: Verify on Node ${{ matrix.node }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [22.23.1, 24.18.0]
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Activate the audited npm client that produced the baseline
        run: |
          npm install --global npm@12.0.1 --ignore-scripts
          test "$(npm --version)" = "12.0.1"
      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Run the complete verification gate
        run: npm run verify

  packed-smoke:
    name: Packed smoke on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
      - name: Activate the audited npm client that produced the baseline
        shell: bash
        run: |
          npm install --global npm@12.0.1 --ignore-scripts
          test "$(npm --version)" = "12.0.1"
      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Build, install, and inspect the npm artifact
        run: npm run check:package

  dependency-audit:
    name: Dependency audit with npm 12.0.1
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install the audited npm client
        run: npm install --global npm@12.0.1 --ignore-scripts
      - name: Verify the npm client version
        run: test "$(npm --version)" = "12.0.1"
      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Audit production dependencies
        run: npm run audit:production
      - name: Audit the complete dependency graph
        run: npm run audit:full

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch the pinned Gitleaks release and verify its checksum
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error --max-time 60 \
            --output gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz' \
            | sha256sum --check -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod 0755 gitleaks
          ./gitleaks version | grep -Fx '8.30.1'
      - name: Scan the complete history for committed secrets
        run: ./gitleaks git --redact --no-banner .

  static-security:
    name: Semgrep and Trivy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check out exact reviewed Semgrep rules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: semgrep/semgrep-rules
          ref: e5b5a42ec061854378c11e0d01f19250b52bc2e9
          path: .semgrep-rules
          persist-credentials: false
      - name: Run exact Semgrep image and immutable security rules
        run: |
          configs=()
          javascriptSecurityConfigs=0
          typescriptSecurityConfigs=0
          while IFS= read -r directory; do
            configs+=(--config "$directory")
            case "$directory" in
              .semgrep-rules/javascript/*) ((javascriptSecurityConfigs += 1)) ;;
              .semgrep-rules/typescript/*) ((typescriptSecurityConfigs += 1)) ;;
            esac
          done < <(find .semgrep-rules/javascript .semgrep-rules/typescript \
            -type d -name security -print | LC_ALL=C sort)
          test "${#configs[@]}" -gt 0
          test "${javascriptSecurityConfigs}" -gt 0
          test "${typescriptSecurityConfigs}" -gt 0
          docker run --rm \
            --volume "${PWD}:/src" \
            --workdir /src \
            semgrep/semgrep@sha256:f42392ee2c00f0de06702135e0e20415f481935900790fbe37aa778591be3999 \
            semgrep scan "${configs[@]}" --config .semgrep-rules/javascript/audit \
            --metrics off --error \
            --no-git-ignore src scripts test
      - name: Run exact Trivy image over vulnerabilities, configuration, and secrets
        run: |
          docker run --rm \
            --volume "${PWD}:/src" \
            --workdir /src \
            aquasec/trivy@sha256:c6e969c5662a546ad5de4a73c2a6b7a7c627f86d916903e175aa623af5b97ada \
            fs --scanners vuln,misconfig,secret --exit-code 1 --no-progress \
            --skip-dirs .audit --skip-dirs .git --skip-dirs .semgrep-rules \
            --skip-dirs .test-dist \
            --skip-dirs dist --skip-dirs node_modules .

  external-links:
    name: External links
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check public documentation and runtime-served links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --config .lychee.toml README.md CHANGELOG.md CODE_OF_CONDUCT.md
            CONTRIBUTING.md ROADMAP.md SECURITY.md SUPPORT.md
            THIRD_PARTY_NOTICES.md docs/**/*.md release/official-urls.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
